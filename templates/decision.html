<!DOCTYPE html>
<html>
<head>
    <title>Outfit Decision</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/decision.css') }}">
</head>
<body>

<div class="decision-container">

    <h1>⏳ Outfit Decision Time</h1>

    <form action="/add_decision" method="POST">

        <label>How long did it take to choose your outfit?</label>

        <select name="decision_time" required>
            <option value="">Select Time</option>
            <option value="1">Less than 1 min</option>
            <option value="3">1–5 minutes</option>
            <option value="7">5–10 minutes</option>
            <option value="15">More than 10 minutes</option>
        </select>

        <button type="submit">Save</button>

    </form>

</div>

</body>
</html>
