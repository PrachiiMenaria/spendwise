{% extends "base.html" %}
{% block title %}Setup — WardrobeIQ{% endblock %}
{% block content %}

<div class="survey-wrap">
  <div class="chapter reveal" style="margin-bottom:16px;justify-content:center;">
    <span class="chapter-num">Setup</span>
    <div class="chapter-line"></div>
    <span class="chapter-text">One-time survey</span>
  </div>
  <h1 class="reveal reveal-delay-1" style="text-align:center;margin-bottom:8px;font-size:2.4rem;">
    Tell us your<br><em>wardrobe story.</em>
  </h1>
  <p class="reveal reveal-delay-2" style="text-align:center;margin-bottom:40px;">
    This calibrates your predictions. Takes 60 seconds.
  </p>

  <div class="survey-card reveal reveal-delay-2">
    <div class="progress-track">
      <div class="progress-fill" style="width:60%;"></div>
    </div>

    <form method="POST" action="{{ url_for('survey') }}">
      <div class="form-group">
        <label class="form-label">Monthly Clothing Budget (₹)</label>
        <input class="form-input" type="number" name="monthly_budget" placeholder="e.g. 10000" required min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Total Clothing Items You Own</label>
        <input class="form-input" type="number" name="wardrobe_size" placeholder="e.g. 60" required min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Avg Time to Choose an Outfit (minutes)</label>
        <input class="form-input" type="number" name="average_decision_time" placeholder="e.g. 15" required min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Last Month's Spending on Clothes (₹)</label>
        <input class="form-input" type="number" name="monthly_spending" placeholder="e.g. 7500" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">How Often Do You Repeat Outfits?</label>
        <select class="form-select" name="repeat_frequency">
          <option value="">Select...</option>
          <option>Very Often</option>
          <option>Sometimes</option>
          <option>Rarely</option>
          <option>Never</option>
        </select>
      </div>
      <button type="submit" class="btn-gold btn-full mt-20">
        Continue to Dashboard &nbsp;→
      </button>
    </form>
  </div>
</div>

{% endblock %}
