<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Spending</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .predict-container {
            max-width: 520px;
            margin: 80px auto;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
        }
        h2 { margin-bottom: 28px; font-size: 24px; }
        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }
        input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: white;
            font-size: 14px;
        }
        button {
            margin-top: 28px;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff4ecd, #7df9ff);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.03); }
    </style>
</head>
<body>
<div class="predict-container">
    <h2>📊 Spending Prediction</h2>

    <form action="/predict" method="POST">

        <label>Monthly Budget (₹)</label>
        <!-- FIX: name="monthly_budget" matches app.py -->
        <input type="number" name="monthly_budget" placeholder="e.g. 10000" required>

        <label>Last Month Spending (₹)</label>
        <!-- FIX: name="last_month_spending" (was last_spending — mismatched) -->
        <input type="number" name="last_month_spending" placeholder="e.g. 7500" required>

        <label>Number of Purchases Last Month</label>
        <!-- FIX: name="num_purchases" (was purchase_count — pipeline uses num_purchases) -->
        <input type="number" name="num_purchases" placeholder="e.g. 5" required>

        <label>Wardrobe Size (number of clothing items)</label>
        <input type="number" name="wardrobe_size" placeholder="e.g. 60" required>

        <label>Total Times Clothes Were Worn (last month)</label>
        <input type="number" name="total_times_worn" placeholder="e.g. 90" required>

        <label>Average Outfit Decision Time (minutes)</label>
        <!-- FIX: name="avg_outfit_decision_min" (was decision_time — pipeline uses this key) -->
        <input type="number" name="avg_outfit_decision_min" placeholder="e.g. 15" step="0.1" required>

        <label>Shopping Frequency (times per week)</label>
        <input type="number" name="shopping_frequency" placeholder="e.g. 2.5" step="0.1" required>

        <button type="submit">🔮 Predict My Spending</button>
    </form>
</div>
</body>
</html>
