<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — SpendWise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo">Spend<span>Wise</span></div>
    <div class="auth-tagline">Create your account</div>

    {% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="flash-msg {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Arjun Kumar" required autofocus value="{{ request.form.get('name','') }}">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required value="{{ request.form.get('email','') }}">
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Age <span style="color:var(--warm-300);font-weight:300;">(optional)</span></label>
          <input type="number" name="age" class="form-control" placeholder="25" min="13" max="100" value="{{ request.form.get('age','') }}">
        </div>
        <div class="form-group">
          <label class="form-label">Gender <span style="color:var(--warm-300);font-weight:300;">(optional)</span></label>
          <select name="gender" class="form-control">
            <option value="">Prefer not to say</option>
            <option value="Male" {% if request.form.get('gender') == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if request.form.get('gender') == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if request.form.get('gender') == 'Other' %}selected{% endif %}>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span style="color:var(--warm-300);font-weight:300;">(min 6 characters)</span></label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px;">
        Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div style="text-align:center;font-size:13px;color:var(--warm-300);">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--gold);font-weight:500;">Sign in</a>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <a href="{{ url_for('home') }}" style="font-size:12px;color:var(--warm-200);">← Back to home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>initFlashDismiss();</script>
</body>
</html>
