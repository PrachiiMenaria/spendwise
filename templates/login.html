<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SpendWise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Spend<span>Wise</span></div>
    <div class="auth-tagline">Welcome back</div>

    {% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="flash-msg {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>
    <div style="text-align:center;font-size:13px;color:var(--warm-300);">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--gold);font-weight:500;">Create one</a>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <a href="{{ url_for('home') }}" style="font-size:12px;color:var(--warm-200);">← Back to home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>initFlashDismiss();</script>
</body>
</html>
